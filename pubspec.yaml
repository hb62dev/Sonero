name: sonero_app
description: "Sonero — Tu colector de música personal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Global hotkeys (configurable)
  hotkey_manager: ^0.2.3
  window_manager: ^0.3.9

  # State management
  provider: ^6.1.2

  # Persistence (settings, hotkey config)
  shared_preferences: ^2.3.2

  # File/folder picker
  file_picker: ^8.1.2

  # Path utilities
  path: ^1.9.0

  # Date formatting
  intl: ^0.19.0

  # CSV export
  csv: ^6.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_colorpicker: ^1.1.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
